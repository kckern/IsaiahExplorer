version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node --version
        - npm ci --legacy-peer-deps
    build:
      commands:
        # Next.js 14 (App Router) SSR build.
        # The Amplify app's platform field must be WEB_COMPUTE for SSR to be
        # served from Lambda; see scripts/amplify-migrate.sh for the one-time
        # platform flip.
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=0, must-revalidate'
        # Security headers on static assets too — Amplify serves these directly
        # without invoking Next's headers() (which only covers SSR responses).
        - key: X-Frame-Options
          value: 'DENY'
        - key: X-Content-Type-Options
          value: 'nosniff'
        - key: Referrer-Policy
          value: 'strict-origin-when-cross-origin'
        - key: Strict-Transport-Security
          value: 'max-age=63072000; includeSubDomains'
    - pattern: '_next/static/**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
    # Dynamic OG card (app/og/route.tsx): deterministic per query string,
    # so let the CDN cache it instead of hitting the Lambda on every
    # crawler scrape. Without this the blanket **/* rule above forces
    # max-age=0.
    - pattern: 'og'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'

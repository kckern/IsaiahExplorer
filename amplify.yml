version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node --version
        - npm ci
        - npx tsc --noEmit
        - npx jest --ci
    build:
      commands:
        # Next.js 16 (App Router) SSR build.
        # The Amplify app's platform field must be WEB_COMPUTE for SSR to be
        # served from Lambda; see scripts/amplify-migrate.sh for the one-time
        # platform flip.
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=0, must-revalidate'
        # Security headers on static assets too — Amplify serves these directly
        # without invoking Next's headers() (which only covers SSR responses).
        - key: X-Frame-Options
          value: 'DENY'
        - key: X-Content-Type-Options
          value: 'nosniff'
        - key: Referrer-Policy
          value: 'strict-origin-when-cross-origin'
        - key: Strict-Transport-Security
          value: 'max-age=63072000; includeSubDomains'
    - pattern: '_next/static/**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
    # Compressed data corpus — the blanket **/* rule above otherwise forces
    # revalidation on every request of ~67 MB of commentary JSON + 3.7 MB of
    # translation text that only change on a data rebuild. Cache them at the CDN
    # (a day, with a week of stale-while-revalidate). If a rebuild must bust the
    # cache sooner, add a ?v=<hash> query when fetching.
    #
    # `com/**` (not `com/**/*`) so flat files directly under the dir match. The
    # security headers are repeated here because Amplify may REPLACE (not merge)
    # the blanket rule's headers for a more specific pattern — without them the
    # corpus responses would silently lose X-Frame-Options/nosniff/HSTS.
    # Verify post-deploy: `curl -sI <origin>/core/core.txt | grep -i cache`.
    - pattern: 'com/**'
      headers:
        - key: Cache-Control
          value: 'public, max-age=86400, stale-while-revalidate=604800'
        - key: X-Content-Type-Options
          value: 'nosniff'
        - key: Strict-Transport-Security
          value: 'max-age=63072000; includeSubDomains'
    - pattern: 'text/**'
      headers:
        - key: Cache-Control
          value: 'public, max-age=86400, stale-while-revalidate=604800'
        - key: X-Content-Type-Options
          value: 'nosniff'
        - key: Strict-Transport-Security
          value: 'max-age=63072000; includeSubDomains'
    - pattern: 'core/**'
      headers:
        - key: Cache-Control
          value: 'public, max-age=3600, stale-while-revalidate=86400'
        - key: X-Content-Type-Options
          value: 'nosniff'
        - key: Strict-Transport-Security
          value: 'max-age=63072000; includeSubDomains'
    # Dynamic OG card (app/og/route.tsx): deterministic per query string,
    # so let the CDN cache it instead of hitting the Lambda on every
    # crawler scrape. Without this the blanket **/* rule above forces
    # max-age=0.
    - pattern: 'og'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 16
        - nvm use 16
        - node --version
        - npm install --legacy-peer-deps
    build:
      commands:
        # Use react-scripts directly on Node 16 — no --openssl-legacy-provider needed
        # (Node 16 still defaults to legacy OpenSSL provider, so webpack 4 works as-is)
        - node node_modules/.bin/react-scripts build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=0, must-revalidate'
    - pattern: 'static/**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'

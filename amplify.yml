version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 16
        - nvm use 16
        - node --version
        - npm install --legacy-peer-deps
    build:
      commands:
        # CI=false: Amplify sets CI=true by default which elevates ESLint warnings
        # to build errors. The legacy codebase has many pre-existing warnings
        # (unused vars, exhaustive-deps) that the local dev build has always tolerated.
        # Node 16 doesn't need --openssl-legacy-provider; webpack 4 works as-is.
        - CI=false node node_modules/.bin/react-scripts build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=0, must-revalidate'
    - pattern: 'static/**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
